name: CI - Frontend

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/ci-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test @fluppy/core
        run: pnpm test

      - name: Build SDK packages + frontend app
        run: pnpm build

      - name: Lint frontend
        run: pnpm --filter frontend lint
