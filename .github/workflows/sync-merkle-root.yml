name: Sync Merkle Root

on:
  schedule:
    # Every 10 minutes. GitHub Actions cron syntax is standard 5-field,
    # same as Vercel's, but scheduling is best-effort -- GitHub may
    # delay a run under load, which is fine here since sync-root's own
    # idempotency guard makes late/duplicate triggers harmless.
    - cron: '*/5 * * * *'
  # Allows manual triggering from the Actions tab for testing.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-root endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET "${{ secrets.SYNC_ENDPOINT_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::sync-root returned non-200 status"
            exit 1
          fi
